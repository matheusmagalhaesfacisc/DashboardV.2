<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Corporativo - BI Display</title>
    
    <!-- AJUSTE DE GOVERNANÇA DE ACESSO -->
    <meta http-equiv="Content-Security-Policy" content="frame-src 'self' https://script.google.com https://*.googleusercontent.com https://app.powerbi.com https://docs.google.com;">
    <meta name="referrer" content="no-referrer-when-downgrade">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        #containerDashboards { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; position: absolute; top: 0; left: 0; background: #0f172a; }
        iframe.active { display: block; }
        
        /* Suas classes de escala originais */
        iframe.escala-dash1 { width: 118% !important; height: 118% !important; transform: scale(0.85); transform-origin: 0 0; }
        iframe.escala-dash5 { width: 142% !important; height: 142% !important; transform: scale(0.70); transform-origin: 0 0; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loading-conteudo { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; text-align: center; }
        .loading-imagem { max-width: 80vw; max-height: 70vh; object-fit: contain; animation: pulseLoading 1.8s ease-in-out infinite; }
        .loading-texto { font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px; }
        @keyframes pulseLoading { 0% { opacity: 0.7; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.7; transform: scale(0.98); } }
        #loading.oculto { display: none; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-conteudo">
            <img src="https://drive.google.com/thumbnail?id=1Nd1wRLGCNyJntLTVcbYtWL8hlTPaPuGJ&sz=w1600" alt="Carregando" class="loading-imagem">
            <div class="loading-texto">Carregando dashboards...</div>
        </div>
    </div>
    <div id="containerDashboards"></div>

    <script>
        const listaDashboards = [
            { id: "dash1", nome: "Resumo Monitoria TV", url: "https://matheusmagalhaesfacisc.github.io/resumomonitoriaTV/", ativo: true, classeExtra: "escala-dash1" },
            { id: "dash4", nome: "Google Apps Script - Comex", url: "https://script.google.com/macros/s/AKfycbzrIa8-7cI1ZRmIRwXzGGy9_RMV7zafxsGvf82XdgAGQ8GkpSpwrZUDc0_pGKEsiUqpZQ/exec", ativo: true, classeExtra: "" },
            { id: "dash5", nome: "Dados CRM pipe", url: "https://script.google.com/macros/s/AKfycbwk8CSPW-f0kNUwhXB-LGasygqnSjqQMMwYxZV4vrjt7CYvloAxUIdyvLanI2t_SvIapg/exec", ativo: true, classeExtra: "" },
            { id: "dash6", nome: "Dashboard Principal", url: "https://script.google.com/macros/s/AKfycbwBcwf_60uKKnTnHn051Yn_cO996J5poiV_iopgu-_yMgU-KBLQlteBsr592UUNtMTLKw/exec", ativo: true, classeExtra: "escala-dash1" },
            { id: "dash12", nome: "Relatório Mensal", url: "https://script.google.com/macros/s/AKfycbz-RSmfX5mmmFGtOZvSVUyKgMsmmptDsLkMtvg790AgN8f4StDa2xwQ_8__-Ehp_Cv87Q/exec", ativo: true, classeExtra: "escala-dash5" }
        ];

        const container = document.getElementById("containerDashboards");
        const loading = document.getElementById("loading");
        const dashboardsAtivos = listaDashboards.filter(dash => dash.ativo);
        let currentIndex = 0;
        const tempoRotacao = 60000; 

        function mostrarLoading() { loading.classList.remove("oculto"); }
        function ocultarLoading() { loading.classList.add("oculto"); }

        function criarDashboards() {
            dashboardsAtivos.forEach((dash) => {
                const iframe = document.createElement("iframe");
                iframe.id = dash.id;
                iframe.title = dash.nome;
                iframe.dataset.src = dash.url;
                iframe.dataset.loadedAt = "0";
                
                // IMPORTANTE: Sandbox para mitigar o bloqueio do Google no GitHub
                iframe.setAttribute("sandbox", "allow-forms allow-scripts allow-same-origin allow-popups");

                if (dash.classeExtra) { iframe.classList.add(dash.classeExtra); }

                iframe.addEventListener("load", () => {
                    iframe.dataset.loadedAt = Date.now().toString();
                    if (iframe.classList.contains("active")) { ocultarLoading(); }
                });
                container.appendChild(iframe);
            });
        }

        function carregarDashboard(index, forcarRefresh = false) {
            const iframes = document.querySelectorAll("iframe");
            const iframe = iframes[index];
            if (!iframe) return;
            const jaTemSrc = iframe.getAttribute("src");
            if (!jaTemSrc || forcarRefresh) { iframe.src = iframe.dataset.src; }
            return iframe;
        }

        function mostrarDashboard(index) {
            const iframes = document.querySelectorAll("iframe");
            iframes.forEach(f => f.classList.remove("active"));
            const iframeAtual = carregarDashboard(index);
            if (iframeAtual) {
                iframeAtual.classList.add("active");
                const jaCarregado = Number(iframeAtual.dataset.loadedAt || 0) > 0;
                if (jaCarregado) { ocultarLoading(); } else { mostrarLoading(); }
            }
        }

        function rotacionarDashboard() {
            if (dashboardsAtivos.length <= 1) return;
            currentIndex = (currentIndex + 1) % dashboardsAtivos.length;
            mostrarDashboard(currentIndex);
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (dashboardsAtivos.length === 0) return;
            criarDashboards();
            mostrarDashboard(0);
            if (dashboardsAtivos.length > 1) { setInterval(rotacionarDashboard, tempoRotacao); }
        });
    </script>
</body>
</html>
